<!DOCTYPE html><html class="dark" lang="zh"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>历史开奖</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/babel-standalone@6.26.0/babel.min.js"></script>

<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-tertiary": "#283044", "on-secondary": "#67001b", "surface-tint": "#eec200",
          "surface-container-low": "#0d1c2d", "on-primary-container": "#6c5700",
          "primary-fixed": "#ffe083", "inverse-on-surface": "#233143",
          "on-tertiary-fixed": "#131b2e", "inverse-surface": "#d4e4fa",
          "surface-container-lowest": "#010f1f", "error-container": "#93000a",
          "surface-container-highest": "#273647", "inverse-primary": "#735c00",
          "error": "#ffb4ab", "background": "#051424", "on-primary-fixed-variant": "#574500",
          "on-primary": "#3c2f00", "primary-fixed-dim": "#eec200", "surface-dim": "#051424",
          "on-secondary-fixed": "#40000d", "surface-container-high": "#1c2b3c",
          "on-surface-variant": "#d1c6ab", "on-secondary-container": "#ffc2c4",
          "secondary-fixed": "#ffdadb", "on-error-container": "#ffdad6",
          "secondary-container": "#b50036", "tertiary-fixed": "#dae2fd",
          "secondary": "#ffb2b7", "on-error": "#690005", "surface": "#051424",
          "surface-bright": "#2c3a4c", "on-tertiary-container": "#51596f",
          "primary-container": "#facc15", "outline": "#9a9078",
          "secondary-fixed-dim": "#ffb2b7", "on-secondary-fixed-variant": "#92002a",
          "on-background": "#d4e4fa", "primary": "#ffecb9", "outline-variant": "#4d4632",
          "on-tertiary-fixed-variant": "#3f465c", "on-primary-fixed": "#231b00",
          "surface-variant": "#273647", "surface-container": "#122131",
          "on-surface": "#d4e4fa", "tertiary-fixed-dim": "#bec6e0",
          "tertiary": "#e8ecff", "tertiary-container": "#c9d0ea"
        },
        borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
        spacing: {
          gutter: "16px", "stack-md": "16px", "stack-sm": "8px",
          "container-margin": "24px", "stack-lg": "32px", "card-padding": "24px"
        },
        fontFamily: {
          "headline-md": ["Hanken Grotesk"], "label-mono": ["JetBrains Mono"],
          "display-lg": ["Hanken Grotesk"], "headline-sm": ["Hanken Grotesk"],
          "body-sm": ["Inter"], "body-lg": ["Inter"], "number-xl": ["Hanken Grotesk"]
        },
        fontSize: {
          "headline-md": ["24px", { lineHeight: "32px", fontWeight: "700" }],
          "label-mono": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "500" }],
          "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "800" }],
          "headline-sm": ["20px", { lineHeight: "28px", fontWeight: "600" }],
          "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
          "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
          "number-xl": ["28px", { lineHeight: "32px", fontWeight: "700" }]
        }
      }
    }
  };
</script>

<style>
  .glass-card {
    background: rgba(30, 41, 59, 0.45);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
  .ball-gold {
    background: radial-gradient(circle at 30% 30%, #ffecb9, #eec200);
    box-shadow: 0 0 15px rgba(238, 194, 0, 0.4);
  }
  .ball-coral {
    background: radial-gradient(circle at 30% 30%, #ffdadb, #b50036);
    box-shadow: 0 0 15px rgba(181, 0, 54, 0.4);
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  body {
    min-height: max(884px, 100dvh);
    background-color: #051424;
    background-image:
      radial-gradient(at 0% 0%, rgba(238, 194, 0, 0.05) 0px, transparent 50%),
      radial-gradient(at 100% 0%, rgba(181, 0, 54, 0.05) 0px, transparent 50%);
  }
  .hide-scrollbar::-webkit-scrollbar { display: none; }
  .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .p-card-padding { padding: 20px !important}
</style>
</head>

<body class="text-on-surface font-body-lg min-h-screen flex flex-col">

<!-- TopAppBar -->
<header class="bg-background/50 backdrop-blur-xl border-b border-white/10 shadow-[0_8px_32px_0_rgba(5,20,36,0.5)] flex justify-between items-center px-container-margin h-16 w-full fixed top-0 z-50">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded-full overflow-hidden border border-primary/30">
      <img alt="logo" class="w-full h-full object-cover" src="./image/jia.png" onerror="this.style.display='none'">
    </div>
    <h1 class="font-display-lg text-[24px] font-extrabold text-primary tracking-tight">历史开奖</h1>
  </div>
  <button class="text-primary hover:opacity-80 transition-opacity active:scale-95">
    <span class="material-symbols-outlined" style="font-size:24px;">notifications</span>
  </button>
</header>

<!-- Main Canvas -->
<main class="flex-1 mt-16 mb-20 px-container-margin pt-stack-lg max-w-[1200px] mx-auto w-full">
  <div id="root"></div>
</main>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center h-20 px-4 pb-safe bg-surface-container-lowest/60 backdrop-blur-2xl border-t border-white/10 shadow-[0_-10px_40px_rgba(0,0,0,0.3)]">
  <a href="./index.html" class="flex flex-col items-center justify-center text-outline opacity-60 hover:text-primary-fixed transition-colors active:scale-90 transition-transform">
    <span class="material-symbols-outlined">military_tech</span>
    <span class="font-label-mono text-label-mono">开奖结果</span>
  </a>
  <a class="flex flex-col items-center justify-center text-primary-fixed font-bold drop-shadow-[0_0_8px_rgba(255,236,185,0.6)] active:scale-90 transition-transform" href="#">
    <span class="material-symbols-outlined">history</span>
    <span class="font-label-mono text-label-mono">历史开奖</span>
  </a>
  <a class="flex flex-col items-center justify-center text-outline opacity-60 hover:text-primary-fixed transition-colors active:scale-90 transition-transform" href="#">
    <span class="material-symbols-outlined">leaderboard</span>
    <span class="font-label-mono text-label-mono">数据分析</span>
  </a>
</nav>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  const PAGE_SIZE = 20; // 每页条数
  const CACHE_KEY = 'aomen_history_data';
  const CACHE_TIME_KEY = 'aomen_history_cache_time';
  const CACHE_TTL = 10 * 60 * 1000;
  const API_URL = 'https://history.macaumarksix.com/history/macaujc2/y/2026';

  // 星期映射
  const WEEK_NAMES = ['日', '一', '二', '三', '四', '五', '六'];

  // 格式化开奖时间，附带星期
  const formatDate = (openTime) => {
    if (!openTime) return '';
    const d = new Date(openTime.replace(' ', 'T'));
    if (isNaN(d)) return openTime;
    const date = openTime.slice(0, 10);
    const week = WEEK_NAMES[d.getDay()];
    return `${date} (星期${week})`;
  };

  // 读缓存
  const readCache = () => {
    try {
      const data = localStorage.getItem(CACHE_KEY);
      const time = localStorage.getItem(CACHE_TIME_KEY);
      if (data && time && Date.now() - Number(time) < CACHE_TTL) {
        return JSON.parse(data);
      }
    } catch (e) {}
    return null;
  };

  // 写缓存
  const writeCache = (data) => {
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify(data));
      localStorage.setItem(CACHE_TIME_KEY, String(Date.now()));
    } catch (e) {}
  };

  // 请求接口
  const loadFromApi = () => new Promise((resolve) => {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', API_URL, true);
    xhr.timeout = 10000;
    xhr.onload = () => {
      if (xhr.status === 200) {
        try {
          const json = JSON.parse(xhr.responseText);
          if (json.result && Array.isArray(json.data)) {
            writeCache(json.data);
            resolve(json.data);
            return;
          }
        } catch (e) {}
      }
      resolve([]);
    };
    xhr.onerror = xhr.ontimeout = () => resolve([]);
    xhr.send();
  });

  // ===== 组件 =====

  // 骨架屏
  const SkeletonItem = () => (
    <div className="glass-card rounded-xl p-card-padding animate-pulse">
      <div className="flex justify-between mb-4">
        <div>
          <div className="h-5 w-28 bg-white/10 rounded mb-2"></div>
          <div className="h-3 w-44 bg-white/10 rounded"></div>
        </div>
        <div className="w-6 h-6 bg-white/10 rounded"></div>
      </div>
      <div className="flex gap-2">
        {Array.from({ length: 7 }).map((_, i) => (
          <div key={i} className={`w-9 h-9 rounded-full bg-white/10 ${i === 6 ? 'ml-1' : ''}`}></div>
        ))}
      </div>
    </div>
  );

  // 单条开奖卡片
  const HistoryItem = ({ item, index, isLatest }) => {
    const codes = item.openCode.split(',');
    const zodiacs = item.zodiac.split(',');
    const normalCodes = codes.slice(0, 6);
    const normalZodiacs = zodiacs.slice(0, 6);
    const specialCode = codes[6];
    const specialZodiac = zodiacs[6] || '';

    return (
      <div
        className="glass-card rounded-xl p-card-padding transition-all hover:border-primary/40 group fade-up"
        style={{ animationDelay: `${Math.min(index, 10) * 50}ms` }}
      >
        <div className="flex justify-between items-start mb-4">
          <div>
            <span className={`font-label-mono text-label-mono px-2 py-0.5 rounded border ${
              isLatest
                ? 'text-primary-fixed-dim bg-primary/10 border-primary/20'
                : 'text-on-surface-variant bg-surface-container-high border-white/5'
            }`}>
              第 {item.expect} 期
            </span>
            <p className="font-body-sm text-on-surface-variant mt-2">
              开奖日期: {formatDate(item.openTime)}
            </p>
          </div>
          <button className="text-outline group-hover:text-primary transition-colors">
            <span className="material-symbols-outlined">chevron_right</span>
          </button>
        </div>

        <div className="flex items-center justify-between w-full overflow-x-auto hide-scrollbar">
          <div className="flex gap-1.5 min-w-max">
            {normalCodes.map((code, i) => (
              <div key={i} className="flex flex-col items-center gap-1">
                <div className="ball-gold w-9 h-9 rounded-full flex items-center justify-center text-on-primary-fixed font-number-xl text-[16px]">
                  {code.padStart(2, '0')}
                </div>
                <span className="font-label-mono text-[10px] text-outline">{normalZodiacs[i] || ''}</span>
              </div>
            ))}
            {/* 特码 */}
            <div className="flex flex-col items-center gap-1 ml-2">
              <div className="ball-coral w-9 h-9 rounded-full flex items-center justify-center text-white font-number-xl text-[16px]">
                {specialCode ? specialCode.padStart(2, '0') : '--'}
              </div>
              <span className="font-label-mono text-[10px] text-secondary">{specialZodiac}</span>
            </div>
          </div>
        </div>
      </div>
    );
  };

  // 主应用
  const App = () => {
    const [allData, setAllData] = useState([]);
    const [visibleCount, setVisibleCount] = useState(PAGE_SIZE);
    const [loading, setLoading] = useState(true);
    const [error, setError] = useState(null);

    useEffect(() => {
      const init = async () => {
        try {
          // 优先读缓存
          const cached = readCache();
          if (cached && cached.length > 0) {
            setAllData(cached);
            setLoading(false);
            return;
          }
          // 缓存不存在则请求接口
          const data = await loadFromApi();
          setAllData(data);
        } catch (e) {
          setError('数据加载失败，请稍后重试');
        } finally {
          setLoading(false);
        }
      };
      init();
    }, []);

    const visibleData = allData.slice(0, visibleCount);
    const hasMore = visibleCount < allData.length;

    const loadMore = () => setVisibleCount(c => c + PAGE_SIZE);

    const retry = () => {
      // 清除缓存后重新加载
      try {
        localStorage.removeItem(CACHE_KEY);
        localStorage.removeItem(CACHE_TIME_KEY);
      } catch (e) {}
      setError(null);
      setLoading(true);
      loadFromApi().then(data => {
        setAllData(data);
        setLoading(false);
      }).catch(() => {
        setError('数据加载失败，请稍后重试');
        setLoading(false);
      });
    };

    if (loading) {
      return (
        <div className="space-y-4">
          {Array.from({ length: 5 }).map((_, i) => <SkeletonItem key={i} />)}
        </div>
      );
    }

    if (error) {
      return (
        <div className="glass-card rounded-xl p-card-padding text-center mt-8">
          <span className="material-symbols-outlined text-error block mb-2" style={{ fontSize: 40 }}>error_outline</span>
          <p className="text-error mb-4">{error}</p>
          <button
            onClick={retry}
            className="px-6 py-2 rounded-full border border-primary/40 text-primary text-sm hover:bg-primary/10 transition-colors active:scale-95"
          >重新加载</button>
        </div>
      );
    }

    if (allData.length === 0) {
      return (
        <div className="glass-card rounded-xl p-card-padding text-center mt-8 text-on-surface-variant">
          暂无历史开奖数据
        </div>
      );
    }

    return (
      <div>
        <div className="space-y-4">
          {visibleData.map((item, index) => (
            <HistoryItem
              key={item.expect}
              item={item}
              index={index}
              isLatest={index === 0}
            />
          ))}
        </div>

        {hasMore && (
          <div className="mt-8 mb-12 flex justify-center">
            <button
              onClick={loadMore}
              className="px-8 py-3 rounded-full border border-primary/40 text-primary font-headline-sm hover:bg-primary/5 transition-all active:scale-95"
            >
              加载更多记录
            </button>
          </div>
        )}

        {!hasMore && allData.length > 0 && (
          <p className="text-center text-on-surface-variant font-body-sm mt-8 mb-12 opacity-50">
            已显示全部 {allData.length} 条记录
          </p>
        )}
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body></html>
