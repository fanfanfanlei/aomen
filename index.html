<!-- 历史开奖数据预加载（XHR + localStorage 缓存） -->
<script>
    (function () {
        var CACHE_KEY = 'aomen_history_data';
        var CACHE_TIME_KEY = 'aomen_history_cache_time';
        var CACHE_TTL = 10 * 60 * 1000; // 10分钟
        var API_URL = 'https://history.macaumarksix.com/history/macaujc2/y/2026';

        function notifyReact(data) {
            window.__historyData = data;
            window.__historyDataReady = true;
            // 触发自定义事件，通知 React 数据就绪
            document.dispatchEvent(new CustomEvent('historyDataReady'));
        }

        // 尝试读缓存
        try {
            var cached = localStorage.getItem(CACHE_KEY);
            var cachedTime = localStorage.getItem(CACHE_TIME_KEY);
            if (cached && cachedTime && Date.now() - Number(cachedTime) < CACHE_TTL) {
                notifyReact(JSON.parse(cached));
                return;
            }
        } catch (e) { /* ignore */ }

        // 发起 XHR 请求
        var xhr = new XMLHttpRequest();
        xhr.open('GET', API_URL, true);
        xhr.timeout = 10000;
        xhr.onload = function () {
            if (xhr.status === 200) {
                try {
                    var json = JSON.parse(xhr.responseText);
                    if (json.result && Array.isArray(json.data)) {
                        try {
                            localStorage.setItem(CACHE_KEY, JSON.stringify(json.data));
                            localStorage.setItem(CACHE_TIME_KEY, String(Date.now()));
                        } catch (e) { /* storage full, ignore */ }
                        notifyReact(json.data);
                        return;
                    }
                } catch (e) { /* parse error */ }
            }
            notifyReact([]);
        };
        xhr.onerror = xhr.ontimeout = function () { notifyReact([]); };
        xhr.send();
    })();
</script>

<script type="text/babel">
    const { useState, useEffect } = React;

    // ============ 数据工具 ============
    // 解析单条开奖记录，返回正码和特码
    const parseOpenCode = (item) => {
        const codes = item.openCode.split(',');
        const zodiacs = item.zodiac.split(',');
        const normalNums = codes.slice(0, 6).map(Number);
        const normalZodiacs = zodiacs.slice(0, 6);
        const specialNum = Number(codes[6]);
        const specialZodiac = zodiacs[6] || '';
        return { normalNums, normalZodiacs, specialNum, specialZodiac };
    };

    // ============ 组件定义 ============

    // 号码球
    const NumberBall = ({ number, type = 'gold', size = 'sm' }) => {
        const sizeClass = size === 'md'
            ? 'w-8 h-8 md:w-9 md:h-9'
            : 'w-8 h-8 md:w-9 md:h-9';
        const isCoral = type === 'coral';
        return (
            <div className={`rounded-full flex items-center justify-center ${sizeClass} ${
                isCoral
                    ? 'bg-secondary-container border-2 border-secondary number-glow-coral'
                    : 'bg-primary-fixed-dim border border-primary/30 number-glow-yellow'
            }`}>
                <span className={`font-bold text-xs md:text-sm ${isCoral ? 'text-on-secondary-container' : 'text-on-primary'}`}>
                    {String(number).padStart(2, '0')}
                </span>
            </div>
        );
    };

    // 预测号码网格
    const NumberGrid = ({ numbers, paddingBottom, specialNum }) => (
        <div className="grid grid-cols-8 gap-2 md:gap-3" style={{ paddingBottom: paddingBottom || 0 }}>
            {numbers.map((num, idx) => (
                <div key={idx} className="flex items-center justify-center">
                    <NumberBall number={num} type={specialNum !== undefined && num === specialNum ? 'coral' : 'gold'} size="sm" />
                </div>
            ))}
        </div>
    );

    // 卡片头部
    const CardHeader = ({ title, subtitle }) => (
        <div className="flex justify-between items-center mb-6 group/header">
            <div className="flex flex-row gap-4">
                <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-primary-fixed to-surface-tint flex items-center justify-center shadow-lg shadow-primary/20">
                    <span className="font-headline-sm text-on-primary-fixed font-bold">澳</span>
                </div>
                <div>
                    <h4 className="font-headline-sm text-headline-sm text-primary flex items-center gap-2">
                        <span className="material-symbols-outlined text-primary">auto_graph</span>{title}
                    </h4>
                    <p className="text-on-surface-variant font-label-mono opacity-70" style={{ fontSize: '0.875rem' }}>{subtitle}</p>
                </div>
            </div>
            <a href="#" className="flex items-center justify-center p-2 rounded-full hover:bg-primary/10 transition-colors duration-300">
                <span className="material-symbols-outlined text-primary/40 group-hover/header:text-primary transition-colors">chevron_right</span>
            </a>
        </div>
    );

    // 开奖号码行（正码+特码）
    const ResultRow = ({ normalNums, normalZodiacs, specialNum, specialZodiac }) => (
        <div className="new-padding flex flex-col items-center relative overflow-hidden group/card hover:bg-white/5 transition-colors duration-300">
            <div className="absolute inset-0 pointer-events-none bg-[radial-gradient(circle_at_center,rgba(238,194,0,0.05)_0%,transparent_70%)]"></div>
            <div className="relative z-10 w-full flex items-center justify-between flex-nowrap">
                {normalNums.map((num, idx) => (
                    <div key={idx} className="flex flex-col items-center gap-1">
                        <NumberBall number={num} type="gold" size="md" />
                        <span className="text-on-surface-variant font-label-mono text-[10px] md:text-xs">{normalZodiacs[idx] || ''}</span>
                    </div>
                ))}
                <div className="flex items-center opacity-40 mx-0.5">
                    <span className="material-symbols-outlined text-on-surface text-sm">add</span>
                </div>
                <div className="flex flex-col items-center gap-1">
                    <NumberBall number={specialNum} type="coral" size="md" />
                    <span className="text-on-surface-variant font-label-mono text-[10px] md:text-xs">{specialZodiac}</span>
                </div>
            </div>
        </div>
    );

    // 下期预测卡片（无历史开奖对应）
    const NextPredictCard = ({ expect, predictNumbers }) => (
        <div className="glass-card w-full max-w-lg mt-stack-lg rounded-3xl overflow-hidden p-card-padding transition-all duration-500">
            <CardHeader title="下期预测" subtitle={`第 ${expect} 期`} />
            <NumberGrid numbers={predictNumbers} />
        </div>
    );

    // 历史预测卡片（有历史开奖对应）
    const HistoryPredictCard = ({ expect, predictNumbers, historyItem }) => {
        const { normalNums, normalZodiacs, specialNum, specialZodiac } = parseOpenCode(historyItem);
        return (
            <div className="glass-card w-full max-w-lg rounded-3xl overflow-hidden p-card-padding transition-all duration-500" style={{ marginTop: 16 }}>
                <CardHeader title="历史预测" subtitle={`第 ${expect} 期`} />
                <NumberGrid numbers={predictNumbers} paddingBottom={12} specialNum={specialNum} />
                <ResultRow
                    normalNums={normalNums}
                    normalZodiacs={normalZodiacs}
                    specialNum={specialNum}
                    specialZodiac={specialZodiac}
                />
            </div>
        );
    };

    // 加载占位
    const LoadingSkeleton = () => (
        <div className="glass-card w-full max-w-lg mt-stack-lg rounded-3xl p-card-padding animate-pulse">
            <div className="flex gap-4 mb-6">
                <div className="w-12 h-12 rounded-xl bg-white/10"></div>
                <div className="flex-1 space-y-2 pt-1">
                    <div className="h-4 bg-white/10 rounded w-24"></div>
                    <div className="h-3 bg-white/10 rounded w-16"></div>
                </div>
            </div>
            <div className="grid grid-cols-8 gap-2">
                {Array.from({ length: 16 }).map((_, i) => (
                    <div key={i} className="w-8 h-8 rounded-full bg-white/10 mx-auto"></div>
                ))}
            </div>
        </div>
    );

    // ============ 主应用 ============
    const App = () => {
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [cards, setCards] = useState([]); // { type: 'next'|'history', expect, predictNumbers, historyItem? }

        useEffect(() => {
            const init = () => {
                try {
                    // 历史数据由页面初始化脚本预加载，挂在 window.__historyData
                    // 预测数据直接内联在 window.__predictList
                    const historyData = window.__historyData || [];
                    const predictList = window.__predictList || [];

                    // 以期号为 key 建立历史开奖 map
                    const historyMap = {};
                    historyData.forEach(item => { historyMap[item.expect] = item; });

                    // 找到下期预测（expect 对应下一期，即不在历史开奖中的最新预测）
                    const result = [];

                    // 按 expect 降序排列预测列表
                    const sortedPredicts = [...predictList].sort((a, b) => Number(b.expect) - Number(a.expect));

                    sortedPredicts.forEach(pred => {
                        const nums = pred.predictList.split(',').map(s => Number(s.trim()));
                        const historyItem = historyMap[pred.expect];
                        if (!historyItem) {
                            // 没有对应历史开奖 → 下期预测
                            result.push({ type: 'next', expect: pred.expect, predictNumbers: nums });
                        } else {
                            // 有对应历史开奖 → 历史预测+开奖结果
                            result.push({ type: 'history', expect: pred.expect, predictNumbers: nums, historyItem });
                        }
                    });

                    setCards(result);
                } catch (e) {
                    console.error(e);
                    setError('数据处理失败，请稍后重试');
                } finally {
                    setLoading(false);
                }
            };

            if (window.__historyDataReady) {
                // 数据已就绪（缓存命中场景）
                init();
            } else {
                // 等待 XHR 完成
                document.addEventListener('historyDataReady', init, { once: true });
            }

            return () => {
                document.removeEventListener('historyDataReady', init);
            };
        }, []);

        if (loading) {
            return (
                <div>
                    <LoadingSkeleton />
                    <LoadingSkeleton />
                </div>
            );
        }

        if (error) {
            return (
                <div className="glass-card w-full max-w-lg mt-stack-lg rounded-3xl p-card-padding text-center">
                    <span className="material-symbols-outlined text-error text-4xl mb-2 block">error_outline</span>
                    <p className="text-error">{error}</p>
                    <button
                        onClick={() => window.location.reload()}
                        className="mt-4 px-6 py-2 rounded-full border border-primary/40 text-primary text-sm hover:bg-primary/10 transition-colors"
                    >重新加载</button>
                </div>
            );
        }

        return (
            <div className="w-full flex flex-col items-center">
                {cards.map((card, idx) =>
                    card.type === 'next'
                        ? <NextPredictCard key={idx} expect={card.expect} predictNumbers={card.predictNumbers} />
                        : <HistoryPredictCard key={idx} expect={card.expect} predictNumbers={card.predictNumbers} historyItem={card.historyItem} />
                )}
                {cards.length === 0 && (
                    <div className="glass-card w-full max-w-lg mt-stack-lg rounded-3xl p-card-padding text-center text-on-surface-variant">
                        暂无预测数据
                    </div>
                )}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>


<script>
    document.addEventListener('DOMContentLoaded', () => {
        const body = document.body;
        
        // Add a subtle mouse follow effect for desktop
        if (window.matchMedia('(min-width: 1024px)').matches) {
            const spotlight = document.createElement('div');
            spotlight.className = 'fixed pointer-events-none w-[600px] h-[600px] rounded-full opacity-10 blur-[120px] bg-primary z-0';
            body.appendChild(spotlight);
            
            document.addEventListener('mousemove', (e) => {
                spotlight.style.left = `${e.clientX - 300}px`;
                spotlight.style.top = `${e.clientY - 300}px`;
            });
        }
    });
</script>
